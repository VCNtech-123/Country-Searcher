

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Country</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aubrey&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <section class="header_section">
            <h1 id="main_header">WORLD COUNTRIES LIST</h1>
            <h2 id="country_number">Total Number of countries: </h2>
        </section>

        <section>
            <div class="buttons">
                <button id="starting_word">STARTING WORD</button>
                <button id="search_any">SEARCH WITH ANY WORD</button>
                <button id="filter"><i class="fa-solid fa-arrow-down-a-z"></i></button>
            </div>
            <div class="search_input">
                <input type="text" placeholder="Search country" id="search_bar">
                <i class="fa-solid fa-magnifying-glass" id="search_button"></i>
            </div>
        </section>
    </header>

    <main>
        <section class="all_countries">
            
        </section>
    </main>
    <script src="js/country.js"></script>
	<script src="js/index.js"></script>
    <script src="https://kit.fontawesome.com/948e7b0426.js" crossorigin="anonymous"></script>
</body>

</html>
